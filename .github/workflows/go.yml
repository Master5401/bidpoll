# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testin\
name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'

    - name: Build
      run: go build -v ./cmd/api

    - name: Test
      run: go test -v ./...
    - name: Trigger Render Deployment
      if: github.ref == 'refs/heads/main'
      run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
